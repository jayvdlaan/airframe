[package]
name = "airframe_tabular"
version.workspace = true
edition = "2021"
readme = "README.md"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Config-driven tabular ingest (CSV/TSV) → typed rows for Airframe consumers."

[dependencies]
airframe_core = { version = "1.0.0", path = "../airframe_core" }
csv = "1"
encoding_rs = "0.8"
serde = { version = "1", features = ["derive"] }
thiserror = "1"
tracing = "0.1"
chrono = { version = "0.4", default-features = false, features = ["std", "clock"] }
rust_decimal = { version = "1", default-features = false, features = ["std", "serde"] }

[dev-dependencies]
toml = "0.8"
