[package]
name = "airframe_sdata"
version.workspace = true
edition = "2021"
readme = "README.md"
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "Schema-aware typed repos and caches with optional protected integration."

[dependencies]
airframe_core = { version = "1.0.0", path = "../airframe_core" }
airframe_data = { version = "1.0.0", path = "../airframe_data" }
airframe_macros = { version = "1.0.0", path = "../airframe_macros" }
airframe_pdata = { version = "1.0.0", path = "../airframe_pdata", optional = true }
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
tempfile = "3.21.0"
anyhow = "1"
async-trait = "0.1"
semver = "1"
tracing = "0.1"

[features]
integration-pdata = ["dep:airframe_pdata"]
# Back-compat alias
protected = ["integration-pdata"]

[dev-dependencies]
airframe_crypt = { version = "1.0.0", path = "../airframe_crypt" }
airframe_secrets = { version = "1.0.0", path = "../airframe_secrets" }
